kind = "web"
previewPath = "/"
title = "CotaZero - Ingeniería y Proyectos"
version = "1.0.0"
id = "artifacts/cotazero"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24328

[services.development]
run = "pnpm --filter @workspace/cotazero run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cotazero", "run", "build" ]
publicDir = "artifacts/cotazero/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24328"
BASE_PATH = "/"
